<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Batitrack — Suivi des coûts main d'œuvre</title>

  <!--
    ─── Content Security Policy ────────────────────────────────────────────
    Restricts which origins can be loaded as scripts, styles, fonts, and
    where the page can talk to. Anything else is blocked by the browser.
    Note: 'unsafe-inline' on scripts is required because Babel evaluates
    transformed code as inline scripts; we restrict by host instead.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    font-src  'self' https://fonts.gstatic.com data:;
    img-src   'self' data: blob: https://*.supabase.co;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
    object-src 'none';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex,nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Manrope', 'system-ui', 'sans-serif'] } } }
    };
  </script>

  <style>
    :root {
      --bati-bg: #FAF7F1;
      --bati-card: #FFFFFF;
      --bati-border: #E8E2D8;
      --bati-border-soft: #F0EAE0;
      --bati-text: #1F2421;
      --bati-muted: #6B6359;
      --bati-teal: #0E5460;
      --bati-teal-soft: #D8E5E7;
      --bati-terra: #C25B3F;
      --bati-terra-soft: #F2DCD3;
      --bati-ochre: #C58122;
      --bati-success: #2E9152;
    }
    html, body { font-family: 'Manrope', system-ui, sans-serif; color: var(--bati-text); background: var(--bati-bg); }
    [dir="rtl"] body { font-family: 'Noto Naskh Arabic', 'Manrope', system-ui, sans-serif; }

    .bati-topbar { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-color: var(--bati-border); }
    .bati-sidebar { background: #F5EFE3; border-color: var(--bati-border); }
    .bati-nav-active {
      background: var(--bati-teal);
      color: #fff;
    }
    .bati-card { background: var(--bati-card); border: 1px solid var(--bati-border); }
    .bati-input {
      width: 100%; background: white; border: 1px solid var(--bati-border);
      border-radius: 8px; padding: 8px 12px; font-size: 13px;
    }
    .bati-input:focus { outline: none; border-color: var(--bati-teal); box-shadow: 0 0 0 3px rgba(14,84,96,0.1); }

    /* Grid sticky columns */
    .bati-grid { border-collapse: separate; border-spacing: 0; }
    .bati-grid td, .bati-grid th { background: #fff; }
    .bati-grid .bati-sticky-l { position: sticky; left: 0; z-index: 2; box-shadow: 1px 0 0 var(--bati-border); }
    .bati-grid .bati-sticky-r { position: sticky; right: 0; z-index: 2; }
    .bati-grid .bati-sticky-r-2 { position: sticky; right: 0; z-index: 3; }
    .bati-grid .bati-sticky-r { right: 90px; }
    .bati-grid-compact .bati-sticky-r { right: 90px; }

    /* Hover row hint */
    tbody tr:hover .bati-sticky-l { background: #FCFAF6; }

    /* Subtle moroccan motif behind header */
    .bati-motif {
      background-image:
        repeating-linear-gradient(45deg, rgba(14,84,96,0.03) 0 2px, transparent 2px 14px),
        repeating-linear-gradient(-45deg, rgba(14,84,96,0.03) 0 2px, transparent 2px 14px);
    }

    /* RTL adjustments */
    [dir="rtl"] .bati-grid .bati-sticky-l { left: auto; right: 0; box-shadow: -1px 0 0 var(--bati-border); }
    [dir="rtl"] .bati-grid .bati-sticky-r,
    [dir="rtl"] .bati-grid .bati-sticky-r-2 { right: auto; left: 0; }
    [dir="rtl"] .bati-grid .bati-sticky-r { left: 90px; right: auto; }

    /* Scrollbar polish */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D8D0C2; border-radius: 5px; border: 2px solid #FAF7F1; }
    ::-webkit-scrollbar-thumb:hover { background: #B8AE9D; }

    /* Reduce default tw padding-zero edge cases */
    input, select { font-family: inherit; }

    /* For sticky right column, give the table a min-width */
    .bati-table-wrapper { min-width: 100%; }

    /* User select for grid cells */
    .bati-grid td button { user-select: none; -webkit-user-select: none; }

    /* Fade-in */
    @keyframes batiFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    main > div > * { animation: batiFade 0.25s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (pinned + integrity-verified) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Supabase JS SDK (pinned) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"></script>

  <!-- Auth + bootstrap. Everything below loads the rest of the app only AFTER
       authentication completes, so seed data never leaks to new accounts. -->
  <script type="text/babel" src="src/supa.jsx"></script>
  <script type="text/babel" src="src/auth-screen.jsx"></script>
  <script type="text/babel" src="src/bootstrap.jsx"></script>
</body>
</html>
